server:
  port: 8080
  error:
    whitelabel:
      enabled: false

spring:
  application:
    name: pocketchess-online

  datasource:
    url: jdbc:h2:mem:pocketchess;DB_CLOSE_DELAY=-1
    driver-class-name: org.h2.Driver
    username: sa
    password: ""

  jpa:
    hibernate:
      ddl-auto: update
    open-in-view: false
    properties:
      hibernate:
        format_sql: false

  h2:
    console:
      enabled: true
      path: /h2-console

  thymeleaf:
    cache: false

# Google sign-in is opt-in. Set GOOGLE_CLIENT_ID + GOOGLE_CLIENT_SECRET to enable.
google:
  client-id: ${GOOGLE_CLIENT_ID:}
  client-secret: ${GOOGLE_CLIENT_SECRET:}

logging:
  level:
    org.pocketchess: INFO

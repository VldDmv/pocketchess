<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security"
      th:fragment="layout(title, content)">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <meta name="_csrf"           th:content="${_csrf?.token}">
    <meta name="_csrf_header"    th:content="${_csrf?.headerName}">
    <meta name="_csrf_parameter" th:content="${_csrf?.parameterName}">
    <title th:text="${title} ?: 'PocketChess'">PocketChess</title>
    <!-- Apply persisted theme before stylesheet to avoid FOUC -->
    <script>
        (function () {
            try {
                var t = localStorage.getItem('pc.theme');
                if (!t) t = window.matchMedia &&
                        window.matchMedia('(prefers-color-scheme: light)').matches
                        ? 'light' : 'dark';
                document.documentElement.setAttribute('data-theme', t);
            } catch (e) {}
        })();
    </script>
    <link rel="stylesheet" href="/css/app.css">
</head>
<body>
<header class="topbar">
    <a class="brand" href="/">♞ PocketChess</a>
    <nav>
        <a th:if="${#authorization.expression('isAuthenticated()')}" href="/lobby">Lobby</a>
        <a th:if="${#authorization.expression('isAuthenticated()')}"
           class="who"
           sec:authentication="name"
           th:href="@{'/profile/' + ${#authentication.name}}">user</a>
        <span th:if="${currentElo != null}" class="rating-chip" th:text="${currentElo}">1200</span>
        <button id="theme-toggle" class="link theme-toggle" type="button"
                title="Toggle light / dark theme" aria-label="Toggle theme">🌙</button>
        <form th:if="${#authorization.expression('isAuthenticated()')}"
              method="post" action="/logout" class="inline">
            <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
            <button type="submit" class="link">Log out</button>
        </form>
        <a th:unless="${#authorization.expression('isAuthenticated()')}" href="/login">Log in</a>
        <a th:unless="${#authorization.expression('isAuthenticated()')}" href="/register">Sign up</a>
    </nav>
</header>
<main>
    <th:block th:replace="${content}">content</th:block>
</main>
<script>
    (function () {
        function paintToggle() {
            var b = document.getElementById('theme-toggle');
            if (!b) return;
            var t = document.documentElement.getAttribute('data-theme') || 'dark';
            b.textContent = t === 'light' ? '☀' : '🌙';
        }
        var btn = document.getElementById('theme-toggle');
        if (btn) {
            btn.addEventListener('click', function () {
                var cur = document.documentElement.getAttribute('data-theme') || 'dark';
                var nxt = cur === 'light' ? 'dark' : 'light';
                document.documentElement.setAttribute('data-theme', nxt);
                try { localStorage.setItem('pc.theme', nxt); } catch (e) {}
                paintToggle();
            });
        }
        window.addEventListener('storage', function (e) {
            if (e.key === 'pc.theme' && e.newValue) {
                document.documentElement.setAttribute('data-theme', e.newValue);
                paintToggle();
            }
        });
        paintToggle();
    })();
</script>
</body>
</html>
